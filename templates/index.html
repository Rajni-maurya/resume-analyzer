<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7f9fc;
             background-image: url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
             background-size: cover;
             background-repeat: no-repeat;
             background-attachment: fixed;
             background-position: center;

        }
        .card {
            margin-top: 50px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
              background-color: rgba(255, 255, 255, 0.88);  
              border-radius: 15px;
              box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
              padding: 25px;

        }
        mark {
            background-color: #ffec99;
            color: #000;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <h3 class="text-center mb-4">Resume Upload & Job Description</h3>
                <form method="POST" enctype="multipart/form-data" action="/analyze">
                    <div class="mb-3">
                        <label for="resume" class="form-label">Upload Resume</label>
                        <input type="file" class="form-control" name="resume" required>
                    </div>
                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description</label>
                        <textarea class="form-control" name="job_description" rows="5" placeholder="Enter Job Description"></textarea>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg">Analyze</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

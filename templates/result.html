<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="container">

    <div class="card text-center">

        <h2>Resume Analysis Result</h2>

       <div class="text-center mt-4">

    <h1 style="
        font-size: 50px;
        font-weight: bold;
        color: {% if score > 70 %}green{% elif score > 40 %}orange{% else %}red{% endif %};
    ">
        {{ score }}%
    </h1>

    <h5>Match Score</h5>

    <!-- Progress Bar -->
    <div class="progress mt-3" style="height: 25px;">
        <div class="progress-bar 
            {% if score > 70 %}bg-success
            {% elif score > 40 %}bg-warning
            {% else %}bg-danger
            {% endif %}"
            role="progressbar"
            style="width: {{ score }}%;">
        </div>
    </div>

</div>

        <hr>

        <h4 class="mt-3">✅ Matched Skills</h4>
        <ul>
            {% for skill in matched %}
            <li class="matched">{{ skill }}</li>
            {% endfor %}
        </ul>

        <h4 class="mt-4">❌ Missing Skills</h4>
        <ul>
            {% for skill in missing %}
            <li class="missing">{{ skill }}</li>
            {% endfor %}
        </ul>

        <a href="/" class="btn btn-primary mt-4">Analyze Again</a>

    </div>

</body>
</html>
</body>
</html>

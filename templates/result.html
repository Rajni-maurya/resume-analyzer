<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f7f9fc;
             background-image: url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
             background-size: cover;
             background-repeat: no-repeat;
             background-attachment: fixed;
             background-position: center;

        }
        .card {
            margin-top: 50px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
              background-color: rgba(255, 255, 255, 0.88);  
              border-radius: 15px;
              box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
              padding: 25px;

        }
        mark {
            background-color: #ffec99;
            color: #000;
        }
    </style>

</head>

<body class="container">

    <div class="card text-center">

        <h2>Resume Analysis Result</h2>

       <div class="text-center mt-4">

    <h1 style="
        font-size: 50px;
        font-weight: bold;
        color: {% if score > 70 %}green{% elif score > 40 %}orange{% else %}red{% endif %};
    ">
        {{ score }}%
    </h1>

    <h5>Match Score</h5>

    <!-- Progress Bar -->
    <div class="progress mt-3" style="height: 25px;">
        <div class="progress-bar 
            {% if score > 70 %}bg-success
            {% elif score > 40 %}bg-warning
            {% else %}bg-danger
            {% endif %}"
            role="progressbar"
            style="width: {{ score }}%;">
        </div>
    </div>

</div>

        <hr>

        <h4 class="mt-3">✅ Matched Skills</h4>
        <ul>
            {% for skill in matched %}
            <li class="matched">{{ skill }}</li>
            {% endfor %}
        </ul>

        <h4 class="mt-4">❌ Missing Skills</h4>
        <ul>
            {% for skill in missing %}
            <li class="missing">{{ skill }}</li>
            {% endfor %}
        </ul>

        <a href="/" class="btn btn-primary mt-4">Analyze Again</a>

    </div>

</body>
</html>
